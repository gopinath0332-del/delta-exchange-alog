# Trading Configuration

# Supported timeframes for analysis
timeframes:
  - "1m"
  - "5m"
  - "15m"
  - "30m"
  - "1h"
  - "2h"
  - "3h"
  - "4h"
  - "6h"
  - "12h"
  - "1d"

# Backtesting Configuration
backtesting:
  initial_capital: 1000
  # Delta Exchange fees unified (avg maker/taker + slippage)
  commission: 0.0006 # 0.06% combined fixed fee estimate
  order_size_pct: 1.0 # Use 100% of flat initial capital per trade
  use_compounding: false # If true, use % of current equity instead of initial capital
  #Setting use_compounding: false gives a conservative 232% return on PIPPINUSD that uses $1000 flat per trade. Setting use_compounding: true gives a dynamic 579% return on PIPPINUSD that mimics TradingView exponentially compounding your profits for position sizing.

# Risk Management Rules
risk_management:
  max_position_size: 0.1 # 10% of capital per position
  max_daily_loss: 0.02 # 2% maximum daily loss
  max_drawdown: 0.15 # 15% maximum drawdown
  max_leverage: 10 # Maximum leverage allowed
  position_sizing_type: "atr" # Default sizing method: "margin" or "atr"
  atr_margin_multiplier: 2.0 # Multiplier for ATR-based sizing
  atr_margin_cap_multiplier: 1 # 1x safety cap on actual margin usage

# Notification Settings
notifications:
  discord_enabled: true
  email_enabled: true
  alert_on_trade: true
  alert_on_error: true
  alert_on_position_open: true
  alert_on_position_close: true

# Terminal Settings
terminal:
  refresh_rate: 1 # seconds
  show_charts: true

# Strategy Configuration
strategies:
  cci_ema:
    cci_length: 30
    ema_length: 50
    atr_length: 20 # Updated from 14 to match Pine script
    atr_multiplier: 9.0 # Updated from 4.0 to match Pine script (partial profit target)
    enable_partial_tp: true # Enable partial TP by default (maintains current behavior)
    partial_pct: 0.5 # 50% partial exit when enabled

  double_dip_rsi:
    rsi_period: 14
    long_entry_level: 50.0
    long_exit_level: 40.0
    short_entry_level: 35.0
    short_exit_level: 35.0
    require_prev_long_min_duration: true
    min_days_long: 2
    atr_length: 14
    atr_mult_tp: 4.0
    trail_atr_mult: 3.0
    enable_partial_tp: true # Enable partial TP by default (maintains current behavior)
    partial_pct: 0.5

  rsi_50_ema:
    ema_length: 50
    rsi_length: 14
    rsi_entry_level: 40.0

  macd_psar_100ema:
    macd_fast: 14
    macd_slow: 26
    macd_signal: 9
    ema_length: 100
    sar_start: 0.005
    sar_increment: 0.005
    sar_max: 0.2

  rsi_200_ema:
    rsi_length: 17
    rsi_entry_level: 70
    rsi_exit_level: 35
    ema_length: 200
    atr_length: 17
    atr_multiplier_tp: 2.5
    atr_multiplier_trail: 2.5
    enable_partial_tp: true # Enable partial TP by default (maintains current behavior)
    partial_pct: 0.5
    historical_days: 60 # Fetch 60 days for backtesting (480 3h candles)

  rsi_supertrend:
    rsi_length: 14
    rsi_long_level: 50.0
    atr_length: 10
    atr_multiplier: 2.0

  donchian_channel:
    trade_mode: "Both" # "Long", "Short", "Both"
    enter_period: 20 # Enter channel (highest high period)
    exit_period: 10 # Exit channel (lowest low period)
    atr_period: 16 # ATR calculation period
    atr_mult_tp: 4.0 # ATR multiplier for take profit
    atr_mult_trail: 2.0 # ATR multiplier for trailing stop
    enable_partial_tp: true # Enable partial TP by default (updated from Pine)
    partial_pct: 0.5 # 50% partial exit when enabled
    # Profit Milestone Exits (works alongside ATR partial TP)
    enable_profit_milestones: true
    profit_milestones:
      - pnl_pct: 50 # When PnL >= 50%
        exit_pct: 0.30 # Sell 30% of remaining position
      - pnl_pct: 100 # When PnL >= 100%
        exit_pct: 0.30 # Sell another 30% of remaining
    bars_per_day: 24 # For 1H timeframe
    min_long_days: 0 # Minimum long duration (set to 0 per Pine script)
    # NEW: EMA Trend Filter
    ema_length: 100 # EMA period for entry filter
    ema_source: "close" # Source for EMA calculation (close, open, high, low)
    # 90 days of history so the iterative Heikin Ashi Open calculation converges
    # to match TradingView's HA values.  With only 30 days the HA smoothing is
    # insufficient and signals can fire on effectively-standard-candle values.
    historical_days: 90
    stop_loss_pct: 0.50 # Cap max loss at 50% of margin per trade segment

  # EMA Cross Strategy (BTC 4H)
  ema_cross:
    trade_mode: "Both" # "Long", "Short", "Both"
    fast_ema_length: 10 # Fast EMA period
    slow_ema_length: 20 # Slow EMA period
    allow_flip: true # Allow same-bar close & reverse

  # BB Breakout + TTM Squeeze + RVOL + EMA + HTF Strategy
  bb_breakout:
    trade_mode: "Both" # "Long", "Short", "Both"
    bb_length: 20 # Bollinger Band period
    bb_mult: 2.0 # Bollinger Band standard deviation multiplier
    atr_length: 14 # ATR period (used for trailing SL and KC)
    atr_mult: 2.0 # ATR multiplier for the trailing stop loss
    use_atr_sl: false # Set to false to disable the ATR trailing stop loss entirely
    # EMA Trend Filter (current timeframe)
    use_ema: true
    ema_length: 100 # EMA period on the chart timeframe
    # TTM Squeeze Filter (BB inside Keltner Channels)
    use_squeeze: true
    kc_mult: 1.5 # Keltner Channel ATR multiplier (standard TTM = 1.5)
    squeeze_window: 10 # Allow entry within N bars after squeeze fires
    # RVOL Filter (Relative Volume)
    use_volume: true
    vol_length: 20 # Volume moving average lookback
    rvol_min: 1.5 # Min Relative Volume (1.5 = 1.5x average)
    # HTF Trend Filter (simulated: 1H EMA length = htf_ema_length * htf_multiplier)
    use_htf: true
    htf_multiplier: 4 # 4 = simulate 4H on 1H data (4 * 100 = EMA 400)
    htf_ema_length: 100 # EMA length on the simulated HTF (matches Pine htfLength=100)
    # Data
    historical_days: 60 # Days of history to fetch for warmup/backtest

# Multi-Coin Service Configuration
# Defines symbol groups that can be run together in a single process via
# `python run_terminal.py --multi-coin <strategy_name> --non-interactive`.
# Each symbol runs in its own thread sharing one DeltaRestClient, so the
# in-process threading.Lock in RateLimiter naturally serializes all API calls.
multi_coin:
  donchian_channel:
    symbols:
      - symbol: BIOUSD
        timeframe: 4h
        candle_type: standard
        leverage: 5
        position_sizing_type: "atr" # Switch from "margin" to "atr"
        atr_margin_multiplier: 2.0 # 1.0 is aggressive, 2.0-3.0 is conservative
        target_margin: 50
        log_file: logs/bio.log # Per-coin log file (same as the old dedicated service)
      - symbol: PIPPINUSD
        timeframe: 2h
        candle_type: heikin-ashi
        leverage: 5
        position_sizing_type: "atr" # Switch from "margin" to "atr"
        atr_margin_multiplier: 2.0 # 1.0 is aggressive, 2.0-3.0 is conservative
        target_margin: 50
        log_file: logs/pippin.log
      - symbol: ARCUSD
        timeframe: 1h
        leverage: 5
        target_margin: 50
        candle_type: heikin-ashi
        position_sizing_type: "atr" # Switch from "margin" to "atr"
        atr_margin_multiplier: 2.0 # 1.0 is aggressive, 2.0-3.0 is conservative
        log_file: logs/arc.log
  bb_breakout:
    symbols:
      - symbol: "ARCUSD"
        timeframe: "1h"
        candle_type: "standard"
        leverage: 5
        target_margin: 50
        log_file: "logs/bb_arc.log"
####### EVERY TIME A NEW COIN IS ADDED, ADD IT UNDER single_coin (and multi_coin if applicable) IN settings.yaml ########

# Single-Coin Symbol Settings
# Used for strategies launched individually (e.g. python run_terminal.py --strategy 9).
# Key = base asset name: symbol with USD stripped, uppercase (matches base_asset in get_trade_config).
# The global ENABLE_ORDER_PLACEMENT in .env is the only kill-switch for order execution.
single_coin:
  PIPPIN:
    leverage: 5
    target_margin: 50
  BIO:
    leverage: 5
    target_margin: 50
  ARC:
    leverage: 5
    target_margin: 50
  RIVER:
    leverage: 5
    target_margin: 50
  BERA:
    leverage: 5
    target_margin: 50
  PAXG:
    leverage: 5
    target_margin: 30
  BTC:
    leverage: 5
    target_margin: 50
  ETH:
    leverage: 5
    target_margin: 50
  XRP:
    leverage: 5
    target_margin: 50

# Firestore Configuration (for trade journaling)
firestore:
  enabled: true # Enable/disable trade journaling to Firestore
  service_account_path: "config/firestore-service-account.json" # Path to Admin SDK service account key
  collection_name: "trades" # Firestore collection name for trade data
